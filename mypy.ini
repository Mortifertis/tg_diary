[mypy]
python_version = 3.12
files = app
check_untyped_defs = True
warn_return_any = True
warn_unused_configs = True
no_implicit_optional = True
ignore_missing_imports = True

[mypy-app.handlers.*]
ignore_errors = True

[mypy-app.services.backup]
ignore_errors = True

[mypy-app.services.questions]
ignore_errors = True

[mypy-app.services.reminders]
ignore_errors = True

[mypy-app.services.reminder_delivery]
ignore_errors = True
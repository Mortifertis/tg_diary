name: migrations-ci

on:
  pull_request:
    paths:
      - "migrations/**"
      - "tests/test_migrations_ci.py"
      - "alembic.ini"
      - ".github/workflows/migrations.yml"
  push:
    branches:
      - main
    paths:
      - "migrations/**"
      - "tests/test_migrations_ci.py"
      - "alembic.ini"
      - ".github/workflows/migrations.yml"

jobs:
  migrations-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run migration checks
        run: python -m pytest tests/test_migrations_ci.py
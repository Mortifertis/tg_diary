name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check app tests migrations

      - name: Format check (ruff)
        run: ruff format --check app tests migrations

      - name: Type check (phase 1)
        run: mypy --config-file mypy.ini

      - name: Tests with coverage gate
        run: |
          pytest -q \
            --cov=app \
            --cov-report=term-missing:skip-covered \
            --cov-report=xml \
            --cov-fail-under=80

      - name: Migration checks
        run: pytest -q tests/test_migrations_ci.py

      - name: Performance regression checks
        run: pytest -q -m performance

      - name: Build coverage summary
        if: always()
        run: |
          python -m pip install coverage
          coverage report --format=markdown >> "$GITHUB_STEP_SUMMARY"

      - name: Coverage comment for PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync(process.env.GITHUB_STEP_SUMMARY,
              'utf8');
            const marker = '<!-- coverage-report -->';
            const body = `${marker}\n## Coverage report\n\n${report}`;
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            const comments = await github.paginate(
              github.rest.issues.listComments,
              {
                owner,
                repo,
                issue_number,
              }
            );

            const existing = comments.find((comment) =>
              comment.body && comment.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
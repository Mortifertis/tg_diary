name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check app tests migrations

      - name: Format check (ruff)
        run: ruff format --check app tests migrations

      - name: Type check (phase 1)
        run: mypy --config-file mypy.ini

      - name: Tests with coverage gate
        run: |
          pytest -q \
            --cov=app \
            --cov-report=term-missing:skip-covered \
            --cov-report=xml \
            --cov-fail-under=80

      - name: Migration checks
        run: pytest -q tests/test_migrations_ci.py

      - name: Performance regression checks
        run: pytest -q -m performance

      - name: Build coverage summary
        if: always()
        run: |
          python -m pip install coverage
          coverage report --format=markdown >> "$GITHUB_STEP_SUMMARY"

      - name: Coverage comment for PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync(process.env.GITHUB_STEP_SUMMARY,
              'utf8');
            const marker = '<!-- coverage-report -->';
            const body = `${marker}\n## Coverage report\n\n${report}`;
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            const comments = await github.paginate(
              github.rest.issues.listComments,
              {
                owner,
                repo,
                issue_number,
              }
            );

            const existing = comments.find((comment) =>
              comment.body && comment.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

  smoke-e2e-services:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: tg_diary
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d tg_diary"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      TEST_DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/tg_diary
      TEST_REDIS_URL: redis://localhost:6379/15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Smoke e2e against Postgres and Redis services
        run: pytest -q tests/test_smoke_e2e_services.py

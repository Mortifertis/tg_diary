services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: tg_diary
      POSTGRES_PASSWORD: tg_diary
      POSTGRES_DB: tg_diary
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  bot:
    build: .
    depends_on:
      db:
        condition: service_started
      redis:
        condition: service_healthy
    env_file:
      - .env.docker

volumes:
  db_data:
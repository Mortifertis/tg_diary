services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: tg_diary
      POSTGRES_PASSWORD: tg_diary
      POSTGRES_DB: tg_diary
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tg_diary -d tg_diary"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  migrate:
    build: .
    command: python -m app.migrate
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env.docker

  bot:
    build: .
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    env_file:
      - .env.docker

  celery_worker:
    build: .
    command: celery -A app.celery_app.celery_app worker -l info
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    env_file:
      - .env.docker

  celery_beat:
    build: .
    command: celery -A app.celery_app.celery_app beat -l info
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    env_file:
      - .env.docker

volumes:
  db_data: